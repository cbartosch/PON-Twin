services:
  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator:latest
    container_name: pon-spanner-emulator
    ports:
      # gRPC published on host 9011 (host 9010 is held by Zscaler/ZSATunnel).
      # The app talks to the emulator over the docker network on 9010 regardless.
      - "9011:9010"
      - "9020:9020"
    restart: unless-stopped
    # RAM-backed emulator: it holds every seeded row in memory. The twin seeds
    # ~59k lightweight rows (points/cables are kept OUT of Spanner and read from
    # disk), so ~1.5 GB is ample headroom while capping runaway growth.
    mem_limit: 1536m
    mem_reservation: 512m

  digital-twin:
    build: .
    image: pon-digital-twin:latest
    container_name: pon-digital-twin
    depends_on:
      - spanner-emulator
    ports:
      - "8520:8520"
    volumes:
      # Mount a project-local .env (copy .env.example -> .env and add your key)
      # so the Ask (LLM) tab auto-loads OPENAI_API_KEY. Read-only.
      - "./.env:/app/.env:ro"
    environment:
      # Fallback if the shell already exports the key.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Spanner emulator (datastore of record). App connects over the docker network.
      - SPANNER_EMULATOR_HOST=spanner-emulator:9010
      - SPANNER_PROJECT=twin-project
      - SPANNER_INSTANCE=twin-instance
      - SPANNER_DATABASE=twin
    restart: unless-stopped
    # The Streamlit UI loads the national side-files (national_points.json ~30 MB,
    # national_cables.json ~44 MB) and builds pandas/pydeck frames for 355k ODP
    # points + 152k cable paths when the Map tab renders. 2 GB covers that spike
    # with margin; the reservation keeps it schedulable under host pressure.
    mem_limit: 2g
    mem_reservation: 512m
